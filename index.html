<!DOCTYPE html>
<html>
<head>
    <title>Product Order Form</title>

    <style>
        body {
            font-family: Arial;
        }

        fieldset {
            margin: 15px;
            padding: 15px;
            border: 2px solid #333;
        }

        legend {
            font-weight: bold;
        }

        button {
            margin: 15px;
            padding: 10px;
        }
    </style>

    <script>
        function calculateTotal() {
            var items = document.querySelectorAll("input[type='checkbox']");
            var total = 0;

            // for...of loop
            for (var item of items) {
                if (item.checked) {
                    total += parseFloat(item.value);
                }
            }

            document.getElementById("result").innerHTML = "Total Price: ₹" + total;
        }
    </script>
</head>

<body>

    <h2>Product Order Form</h2>

    <form>

        <!-- Category 1 -->
        <fieldset>
            <legend>Electronics</legend>
            <input type="checkbox" value="50000"> Laptop (₹50000)<br>
            <input type="checkbox" value="20000"> Mobile (₹20000)<br>
        </fieldset>

        <!-- Category 2 -->
        <fieldset>
            <legend>Accessories</legend>
            <input type="checkbox" value="1000"> Headphones (₹1000)<br>
            <input type="checkbox" value="500"> Mouse (₹500)<br>
        </fieldset>

        <!-- Category 3 -->
        <fieldset>
            <legend>Clothing</legend>
            <input type="checkbox" value="1500"> Shirt (₹1500)<br>
            <input type="checkbox" value="2000"> Jeans (₹2000)<br>
        </fieldset>

        <button type="button" onclick="calculateTotal()">Calculate Total</button>

    </form>

    <p id="result"></p>

    <p><b>Name: G.V S N Santosh<br>Reg no: 24BCT0297</b></p>

</body>
</html>
